<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Honkai Star Rail Characters</h1>

<button onclick="loadHsrChars()">Load Characters</button>
<button onclick="loadRandom()">Random</button>

<br><br>

<input type="text" id="search" placeholder="Search name">
<button onclick="searchChar()">Search</button>

<br><br>

<ul id="list"></ul>

<h2>Add Character</h2>

<input type="text" id="name" placeholder="Name">
<input type="text" id="CharType" placeholder="Type">
<button onclick="addChar()">Add</button>

<script>

    async function loadHsrChars() {
        const res = await fetch('/api/HsrCharacters')
        const data = await res.json()
        displayList(data)
    }

    function displayList(data) {
        const list = document.getElementById('list')
        list.innerHTML = ''

        data.forEach(char => {
            const li = document.createElement('li')

            li.innerHTML = `
                ${char.name} (${char.CharType})
                <button onclick="deleteChar(${char.id})">Delete</button>
            `

            list.appendChild(li)
        })
    }

    async function addChar() {
        const name = document.getElementById('name').value
        const CharType = document.getElementById('CharType').value

        if (!name || !CharType) {
            alert('Fill all fields')
            return
        }

        const res = await fetch('/api/HsrCharacters', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ name, CharType })
        })

        if (!res.ok) {
            alert('Error adding character')
            return
        }

        document.getElementById('name').value = ''
        document.getElementById('CharType').value = ''

        loadHsrChars()
    }

    async function deleteChar(id) {
        const res = await fetch(`/api/HsrCharacters/${id}`, {
            method: 'DELETE'
        })

        if (!res.ok) {
            alert('Delete failed')
            return
        }

        loadHsrChars()
    }

    async function searchChar() {
        const name = document.getElementById('search').value

        const res = await fetch(`/api/search?name=${name}`)
        const data = await res.json()

        displayList(data)
    }

    async function loadRandom() {
        const res = await fetch('/api/random')
        const data = await res.json()

        displayList([data])
    }

</script>
